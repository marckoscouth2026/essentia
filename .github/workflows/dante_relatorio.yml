name: Relatório Matinal do Dante

on:
  schedule:
    - cron: "30 12 * * *"   # 8h BRT (11h UTC)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:                                          # <-- ADICIONE ESTE BLOCO AQUI
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    # <-- E ESTA LINHA
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install supabase groq requests

      - name: Executar script do Dante
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/dante_relatorio.py
