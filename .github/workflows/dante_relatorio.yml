name: Relatório Matinal do Dante

on:
  schedule:
    - cron: "0 13 * * *"   # 15:00 BRT (18:00 UTC)
  workflow_dispatch:
   repository_dispatch:
    types: [dante-cron]

jobs:
  run:
    runs-on: ubuntu-latest
    # ✅ REMOVIDO: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 para evitar warning
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar script do Dante (com debug)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEBUG: "true"  # Ativa logs detalhados no script
        run: python scripts/dante_relatorio.py

      - name: Notificar erro no Telegram
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          MESSAGE="🚨 <b>FALHA NO WORKFLOW</b>%0A<b>Repo:</b> ${{ github.repository }}%0A<b>Log:</b> <a href=\"$RUN_URL\">Ver detalhes</a>"
          curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"$TG_CHAT\", \"parse_mode\": \"HTML\", \"text\": \"$MESSAGE\"}"
