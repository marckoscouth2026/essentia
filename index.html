<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESSENTIA — Lista VIP</title>
    <style>
        :root {
            --primary: #4CAF50;
            --dark: #1e293b;
            --light: #f8fafc;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { color: var(--dark); margin-bottom: 10px; font-size: 28px; }
        p { color: #64748b; margin-bottom: 30px; font-size: 15px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus { outline: 2px solid var(--primary); }
        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #43a047; }
        .message { margin-top: 20px; font-weight: 500; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>ESSENTIA</h1>
    <p>Entre para a Lista VIP e garanta acesso prioritário aos lotes exclusivos da nossa Kombucha Premium.</p>
    
    <form id="leadForm">
        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" required placeholder="Seu nome">
        </div>
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label for="whatsapp">WhatsApp</label>
            <input type="tel" id="whatsapp" required placeholder="(61) 99999-9999">
        </div>
        <button type="submit" id="btnSubmit">Garantir Sua Essentia</button>
    </form>
    
    <div id="responseMessage" class="message"></div>
</div>

<script src="script.js"></script>
</body>
</html>
